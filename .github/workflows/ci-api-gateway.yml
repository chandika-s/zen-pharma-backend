name: CI/CD — api-gateway

# Triggers on push to develop / release branches only.
# Feature branches and PRs → ci-pr-api-gateway.yml
#
# Jobs:
#   build       → Maven + SAST + Docker + ECR + Cosign
#   deploy-dev  → direct commit to envs/dev/ → ArgoCD auto-syncs → smoke test
#   open-qa-pr  → opens a PR in zen-gitops for envs/qa/ (PR merge = QA deployment)
#
# PROD promotion → promote-prod.yml (workflow_dispatch)

on:
  push:
    branches: [develop, 'release/**']
    paths:
      - 'api-gateway/**'
      - '.github/workflows/ci-api-gateway.yml'

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: api-gateway
  GITOPS_REPO: ravdy/zen-gitops

jobs:

  # ── 1. Build: Maven · CodeQL · Semgrep · OWASP Dep · Trivy · ECR · Cosign ──
  build:
    name: Build & Security Gates
    uses: ./.github/workflows/_java-build.yml
    with:
      service-name: api-gateway
      service-dir: api-gateway
      ecr-repository: api-gateway
      aws-region: us-east-1
      needs-database: false
    secrets: inherit

  # ── 2. Deploy to DEV (direct commit — ArgoCD auto-syncs) ──────────────────
  deploy-dev:
    name: Deploy — DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v6

      - name: Checkout GitOps repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: _gitops

      - name: Update image tag — DEV
        run: |
          yq e '.image.tag = "${{ needs.build.outputs.image-tag }}"' -i \
            "_gitops/envs/dev/values-api-gateway.yaml"
          cd _gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "Already up to date" && exit 0
          git commit -m "ci(dev): update api-gateway → ${{ needs.build.outputs.image-tag }}"
          git push

  # ── 3. Open QA promotion PR in zen-gitops (PR merge = QA deployment) ─────
  open-qa-pr:
    name: Open PR — QA Promotion
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout GitOps repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: _gitops

      - name: Create branch, commit, open PR
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          VALUES="_gitops/envs/qa/values-api-gateway.yaml"
          BRANCH="promote/qa/api-gateway/${IMAGE_TAG}"

          if [[ ! -f "$VALUES" ]]; then
            echo "::warning::$VALUES not found in zen-gitops — QA PR skipped."
            exit 0
          fi

          cd _gitops
          git checkout -b "$BRANCH"
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i "envs/qa/values-api-gateway.yaml"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "QA already has this image — no PR needed"
            exit 0
          fi
          git commit -m "promote(qa): api-gateway → ${IMAGE_TAG}"
          git push origin "$BRANCH"

          printf '%s\n' \
            "## QA Promotion" \
            "" \
            "Service : api-gateway" \
            "Image   : ${IMAGE_TAG}" \
            "Branch  : ${{ github.ref_name }}" \
            "Actor   : ${{ github.actor }}" \
            "Build   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "" \
            "## Checklist" \
            "- [ ] DEV smoke test passed (see build link above)" \
            "- [ ] No unexpected config changes in this diff" \
            "- [ ] QA team sign-off" \
            "" \
            "Merging this PR updates envs/qa/values-api-gateway.yaml." \
            "ArgoCD (pharma-qa) auto-syncs on merge." > /tmp/pr-body.md

          gh pr create \
            --repo "${{ env.GITOPS_REPO }}" \
            --title "promote(qa): api-gateway → ${IMAGE_TAG}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"

          echo "::notice title=QA PR opened::Review and merge in ravdy/zen-gitops to deploy to QA."

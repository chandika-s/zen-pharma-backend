name: CI/CD — drug-catalog-service

# Triggers on push to develop / release branches only.
# Feature branches and PRs → ci-pr-drug-catalog.yml
# PROD promotion → promote-prod.yml (workflow_dispatch)
# Note: zen-gitops uses "catalog-service" as the values file name for this service.

on:
  push:
    branches: [develop, 'release/**']
    paths:
      - 'drug-catalog-service/**'
      - '.github/workflows/ci-drug-catalog.yml'

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: drug-catalog-service
  GITOPS_REPO: ravdy/zen-gitops
  GITOPS_SERVICE_NAME: catalog-service

jobs:

  build:
    name: Build & Security Gates
    uses: ./.github/workflows/_java-build.yml
    with:
      service-name: drug-catalog-service
      service-dir: drug-catalog-service
      ecr-repository: drug-catalog-service
      aws-region: us-east-1
      needs-database: true
    secrets: inherit

  deploy-dev:
    name: Deploy — DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: _gitops

      - name: Update image tag — DEV
        run: |
          yq e '.image.tag = "${{ needs.build.outputs.image-tag }}"' -i \
            "_gitops/envs/dev/values-${{ env.GITOPS_SERVICE_NAME }}.yaml"
          cd _gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "Already up to date" && exit 0
          git commit -m "ci(dev): update ${{ env.GITOPS_SERVICE_NAME }} → ${{ needs.build.outputs.image-tag }}"
          git push

  open-qa-pr:
    name: Open PR — QA Promotion
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: _gitops

      - name: Create branch, commit, open PR
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          SVC="${{ env.GITOPS_SERVICE_NAME }}"
          VALUES="_gitops/envs/qa/values-${SVC}.yaml"
          BRANCH="promote/qa/${SVC}/${IMAGE_TAG}"

          if [[ ! -f "$VALUES" ]]; then
            echo "::warning::$VALUES not found — QA PR skipped."
            exit 0
          fi

          cd _gitops
          git checkout -b "$BRANCH"
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i "envs/qa/values-${SVC}.yaml"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "QA already has this image — no PR needed"
            exit 0
          fi
          git commit -m "promote(qa): ${SVC} → ${IMAGE_TAG}"
          git push origin "$BRANCH"

          printf '%s\n' \
            "## QA Promotion" \
            "" \
            "Service : ${SVC} (drug-catalog-service)" \
            "Image   : ${IMAGE_TAG}" \
            "Branch  : ${{ github.ref_name }}" \
            "Actor   : ${{ github.actor }}" \
            "Build   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "" \
            "## Checklist" \
            "- [ ] DEV smoke test passed (see build link above)" \
            "- [ ] No unexpected config changes in this diff" \
            "- [ ] QA team sign-off" \
            "" \
            "Merging this PR updates envs/qa/values-${SVC}.yaml." \
            "ArgoCD (pharma-qa) auto-syncs on merge." > /tmp/pr-body.md

          gh pr create \
            --repo "${{ env.GITOPS_REPO }}" \
            --title "promote(qa): ${SVC} → ${IMAGE_TAG}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"

          echo "::notice title=QA PR opened::Review and merge in ravdy/zen-gitops to deploy to QA."
